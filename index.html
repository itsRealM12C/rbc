<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Return the Beanbird Cursor</title>
    <style>
        body { background: #1a1a1a; color: #fff; font-family: sans-serif; text-align: center; padding-top: 50px; }
        .btn-container { margin: 20px auto; }
        .btn { 
            padding: 20px; width: 350px; border-radius: 50px; border: none; font-size: 1.2rem; 
            cursor: pointer; margin: 10px; transition: 0.2s;
        }
        #btn-return { background: #ff0066; color: #fff; border: 2px solid #ff9900; }
        #btn-reset { background: #444; color: #ccc; }
        .btn:focus { outline: 3px solid #fff; transform: scale(1.05); }
        .note-box { 
            border: 1px solid #ffcc00; color: #ffcc00; display: inline-block; 
            padding: 10px; margin: 20px; font-size: 0.9rem;
        }
        #console { 
            background: #000; color: #00ff00; width: 80%; height: 150px; 
            margin: 20px auto; padding: 15px; text-align: left; 
            font-family: monospace; overflow-y: auto; border: 1px solid #333;
        }
    </style>
</head>
<body>

    <h1>Return the Beanbird Cursor</h1>
    <p>Press the button below and <b>Accept the prompt on your TV screen.</b></p>

    <div class="btn-container">
        <button id="btn-return" class="btn">Return Beanbird Cursor</button>
        <button id="btn-reset" class="btn">Reset to Default</button>
        <div class="note-box">
            Note: TV will be blackscreen while setting cursor to beanbird cursor for around 10-20 seconds.
        </div>
    </div>

    <div id="console">Status: Ready...</div>

    <script>
        const consoleEl = document.getElementById('console');
        // UPDATE THESE PATHS to where your scripts actually sit on the TV
        const BASE_PATH = "/media/developer/apps/usr/palm/applications/org.webosbrew.hbchannel";
        
        function log(msg) {
            consoleEl.innerHTML += `<br>> ${msg}`;
            consoleEl.scrollTop = consoleEl.scrollHeight;
        }

        function runRemoteCommand(shFile) {
            log("Connecting to TV Service...");
            const ws = new WebSocket('ws://127.0.0.1:3000');

            ws.onopen = () => {
                log("Connected. Please ACCEPT the prompt on screen.");
                ws.send(JSON.stringify({
                    id: "register_0",
                    type: "register",
                    payload: {
                        forcePairing: false,
                        pairingType: "PROMPT",
                        manifest: { permissions: ["LAUNCH", "SYSTEM_CONTROL"] }
                    }
                }));
            };

            ws.onmessage = (evt) => {
                const res = JSON.parse(evt.data);

                if (res.type === "registered") {
                    log(`Authorized! Triggering ${shFile}...`);
                    
                    ws.send(JSON.stringify({
                        id: "exec_payload",
                        type: "request",
                        uri: "luna://org.webosbrew.hbchannel.service/exec",
                        payload: {
                            // This triggers the specific .sh file
                            command: `sh ${BASE_PATH}/${shFile}`
                        }
                    }));
                }

                if (res.id === "exec_payload") {
                    log("Command sent successfully.");
                    if(shFile.includes('beanbird')) log("Wait 10-20s for screen refresh.");
                    ws.close();
                }
            };

            ws.onerror = () => log("Connection failed. Is 'LG Connect Apps' enabled?");
        }

        document.getElementById('btn-return').addEventListener('click', () => runRemoteCommand('beanbird.sh'));
        document.getElementById('btn-reset').addEventListener('click', () => runRemoteCommand('reboot.sh'));

        // Remote Control Support
        document.addEventListener('keydown', (e) => {
            if (e.keyCode === 13) document.activeElement.click();
        });
        
        window.onload = () => document.getElementById('btn-return').focus();
    </script>
</body>
</html>
