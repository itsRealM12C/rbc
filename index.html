<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Beanbird Cursor Restorer</title>
    <style>
        body { background: #1a1a1a; color: white; text-align: center; font-family: sans-serif; padding: 50px; }
        .btn { 
            padding: 25px; width: 320px; margin: 15px; font-size: 1.4rem; 
            background: #cf0652; border: none; color: white; border-radius: 50px;
            cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .btn:hover { background: #ff0066; }
        .btn-reboot { background: #444; }
        #log { 
            background: #000; color: #00ff00; padding: 15px; margin: 20px auto;
            width: 80%; max-height: 200px; overflow-y: auto; text-align: left; 
            font-size: 0.9rem; border: 1px solid #333;
        }
        .warning { color: #ffcc00; font-weight: bold; border: 1px solid #ffcc00; padding: 10px; display: inline-block; }
    </style>
</head>
<body>

    <h1>Return the Beanbird Cursor</h1>
    <p>Press the button below and <b>Accept the prompt on your TV screen</b>.</p>

    <button class="btn" onclick="triggerExploit('beanbird')">Return Beanbird Cursor</button>
    <br>
    <button class="btn btn-reboot" onclick="triggerExploit('reboot')">Reset to Default</button>

    <p class="warning">Note: TV will be blackscreen while setting cursor for around 10-20 seconds.</p>
    
    <div id="log">Status: Ready...</div>

    <script>
        const logBox = document.getElementById('log');
        function log(m) { logBox.innerText += "\n> " + m; logBox.scrollTop = logBox.scrollHeight; }

        // The "Payload" commands
        const COMMANDS = {
            beanbird: "curl -L https://github.com/itsRealM12C/convert/raw/refs/heads/main/4.0.zip -o /tmp/4.0.zip && unzip -o /tmp/4.0.zip -d /tmp/ && rm -rf /tmp/cursors && mv /tmp/4.0 /tmp/cursors && mount --bind /tmp/cursors /usr/share/im && initctl restart surface-manager",
            reboot: "reboot"
        };

        function triggerExploit(type) {
            log("Connecting to TV Service...");
            
            // Connect to the local SSAP server on the TV
            const ws = new WebSocket('ws://127.0.0.1:3000');

            ws.onopen = () => {
                log("Connected. Please ACCEPT the prompt on screen.");
                // Step 1: Register and get permissions
                ws.send(JSON.stringify({
                    id: "register_0",
                    type: "register",
                    payload: {
                        forcePairing: false,
                        pairingType: "PROMPT",
                        manifest: {
                            permissions: ["LAUNCH", "CONTROL_AUDIO", "SYSTEM_CONTROL"]
                        }
                    }
                }));
            };

            ws.onmessage = (evt) => {
                const res = JSON.parse(evt.data);
                
                if (res.type === "registered") {
                    log("Permission Granted! Sending Command...");
                    
                    // Step 2: Request execution via the Homebrew Channel service
                    ws.send(JSON.stringify({
                        id: "exec_cmd",
                        type: "request",
                        uri: "luna://org.webosbrew.hbchannel.service/exec",
                        payload: {
                            command: COMMANDS[type]
                        }
                    }));
                } 
                
                if (res.id === "exec_cmd") {
                    log("Command Sent! " + (type === 'beanbird' ? "Wait 10-20s for blackscreen." : "Rebooting..."));
                    ws.close();
                }
            };

            ws.onerror = () => log("Connection failed. Ensure 'LG Connect Apps' is ON in settings.");
        }
    </script>
</body>
</html>
